---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: qcacheshards.qscaler.qubex.ai
spec:
  group: qscaler.qubex.ai
  names:
    kind: QCacheShard
    listKind: QCacheShardList
    plural: qcacheshards
    singular: qcacheshard
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.size
      name: Size
      type: string
    - jsonPath: .status.imageCount
      name: Images
      type: integer
    - jsonPath: .status.lastAddedImageCount
      name: Added
      type: integer
    - jsonPath: .status.lastRemovedImageCount
      name: Removed
      type: integer
    - jsonPath: .status.lastUpdatedAt
      name: Updated
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              workloadDescriptors:
                description: the list of pods in this shard
                items:
                  properties:
                    architectures:
                      description: Architectures
                      items:
                        enum:
                        - AMD64
                        - ARM64
                        type: string
                      type: array
                    count:
                      description: Count of pods
                      type: integer
                    images:
                      description: container images associated with this pod
                      items:
                        type: string
                      type: array
                    lastSeen:
                      description: Last seen time
                      format: date-time
                      type: string
                    priorityType:
                      description: 'priority type: explicit, daemonset, standard'
                      enum:
                      - PriorityExplicit
                      - PriorityDaemonSet
                      - PriorityStandard
                      type: string
                    pullSecrets:
                      description: List of pull secrets
                      items:
                        properties:
                          name:
                            description: Secret name
                            type: string
                          namespace:
                            description: Secret namespace
                            type: string
                        required:
                        - name
                        - namespace
                        type: object
                      type: array
                  required:
                  - architectures
                  - count
                  - images
                  - lastSeen
                  - priorityType
                  type: object
                type: array
            type: object
          status:
            properties:
              baseImageCount:
                default: 0
                description: Convenience field for the shard's base image count (images
                  that are present in all shards)
                type: integer
              imageCount:
                default: 0
                description: Convenience field for the shard's image count
                type: integer
              imageSizeCalculations:
                description: Image size calculations
                items:
                  description: |-
                    ImageSizeCalculation records the result of calculating the size of a container image for a
                    specific architecture. It captures the outcome status, a human-readable reason on failure, the
                    content hash, total compressed size in bytes, and a per-layer size breakdown used for cache planning.
                  properties:
                    architecture:
                      description: Architecture is the CPU architecture (e.g. AMD64,
                        ARM64) for which the image was inspected.
                      enum:
                      - AMD64
                      - ARM64
                      type: string
                    details:
                      default: ""
                      description: Details provides additional details when Status
                        is Failed.
                      type: string
                    hash:
                      description: Hash is the content-addressable digest of the image
                        manifest, used to detect image updates.
                      type: string
                    image:
                      description: Image is the fully-qualified container image reference
                        that was evaluated.
                      type: string
                    layersHash:
                      additionalProperties:
                        format: int64
                        type: integer
                      description: LayersHash maps each layer digest to its uncompressed
                        size in bytes, used for fine-grained cache planning.
                      type: object
                    reason:
                      default: ""
                      description: Reason provides a human-readable explanation when
                        Status is Failed.
                      type: string
                    size:
                      description: Size is the total uncompressed size of the image
                        in bytes across all layers.
                      format: int64
                      type: integer
                    status:
                      description: Status reflects whether the size calculation is
                        still pending, succeeded, or failed.
                      enum:
                      - Pending
                      - Failed
                      - Success
                      type: string
                  required:
                  - architecture
                  - hash
                  - image
                  - layersHash
                  - size
                  - status
                  type: object
                type: array
              lastAddedImageCount:
                default: 0
                description: The latest time image added
                type: integer
              lastRemovedImageCount:
                default: 0
                description: The latest time image removed
                type: integer
              lastUpdatedAt:
                description: The latest time the shard was updated
                format: date-time
                type: string
              size:
                anyOf:
                - type: integer
                - type: string
                default: 0
                description: Total shard size. The highest value from Sizes field
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              sizes:
                description: Total image sizes per architecture
                items:
                  properties:
                    architecture:
                      enum:
                      - AMD64
                      - ARM64
                      type: string
                    size:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                  required:
                  - architecture
                  - size
                  type: object
                type: array
            type: object
        required:
        - metadata
        type: object
    served: true
    storage: true
    subresources:
      status: {}
